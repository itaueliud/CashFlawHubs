# ============================================================
# EarnHub - Nginx Load Balancer Configuration
# Distributes traffic across 4 backend Node.js instances
# ============================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10m;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json
               application/javascript application/xml+rss
               application/atom+xml image/svg+xml;

    # ============================================================
    # UPSTREAM — 4 Backend Node.js instances (load balanced)
    # Uses least_conn for better distribution with long requests
    # ============================================================
    upstream earnhub_backend {
        least_conn;

        server 127.0.0.1:5001 weight=1 max_fails=3 fail_timeout=30s;
        server 127.0.0.1:5002 weight=1 max_fails=3 fail_timeout=30s;
        server 127.0.0.1:5003 weight=1 max_fails=3 fail_timeout=30s;
        server 127.0.0.1:5004 weight=1 max_fails=3 fail_timeout=30s;

        keepalive 32;
    }

    # ============================================================
    # Rate limiting zones
    # ============================================================
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=200r/m;

    # ============================================================
    # Shared memory for connection limiting
    # ============================================================
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ============================================================
    # HTTP → HTTPS redirect
    # ============================================================
    server {
        listen 80;
        server_name api.earnhub.app;
        return 301 https://$server_name$request_uri;
    }

    # ============================================================
    # Main HTTPS server — API Load Balancer
    # ============================================================
    server {
        listen 443 ssl http2;
        server_name api.earnhub.app;

        # SSL Certificates (use Let's Encrypt / Certbot)
        ssl_certificate     /etc/letsencrypt/live/api.earnhub.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.earnhub.app/privkey.pem;

        # SSL hardening
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_stapling on;
        ssl_stapling_verify on;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'" always;

        # Connection limit per IP
        limit_conn conn_limit 20;

        # Health check endpoint (no rate limit)
        location /health {
            proxy_pass http://earnhub_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            access_log off;
        }

        # Webhook endpoints — higher rate limit (payment providers call these)
        location ~ ^/api/(payments|surveys|offerwalls)/(.*)/callback$ {
            limit_req zone=webhook_limit burst=50 nodelay;
            proxy_pass http://earnhub_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
        }

        # Auth endpoints — strict rate limit
        location /api/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://earnhub_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # All other API endpoints
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://earnhub_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;

            # Buffer settings
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        # Block common attack paths
        location ~ /\. {
            deny all;
        }

        location = /favicon.ico {
            log_not_found off;
            access_log off;
        }
    }

    # ============================================================
    # Status page for monitoring (internal only)
    # ============================================================
    server {
        listen 8080;
        server_name localhost;

        location /nginx_status {
            stub_status on;
            allow 127.0.0.1;
            deny all;
        }
    }
}

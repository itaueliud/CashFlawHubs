version: "3.9"

services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.app
      args: { APP_NAME: apps/api }
    env_file: .env
    depends_on: [redis, mongo]
    ports:
      - "8080:8080"

  discovery:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.app
      args: { APP_NAME: apps/discovery }
    env_file: .env
    depends_on: [redis, mongo]

  scraper-worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.app
      args: { APP_NAME: apps/scraper-worker }
    env_file: .env
    depends_on: [redis, mongo]

  enrichment-worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.app
      args: { APP_NAME: apps/enrichment-worker }
    env_file: .env
    depends_on: [redis, mongo]

  publisher:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.app
      args: { APP_NAME: apps/publisher }
    env_file: .env
    depends_on: [redis, mongo]

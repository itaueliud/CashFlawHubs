apiVersion: apps/v1
kind: Deployment
metadata:
  name: scraper-api
  namespace: job-scraper
spec:
  replicas: 2
  selector:
    matchLabels:
      app: scraper-api
  template:
    metadata:
      labels:
        app: scraper-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: api
          image: ghcr.io/your-org/job-scraper-api:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: scraper-config
            - secretRef:
                name: scraper-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: scraper-api
  namespace: job-scraper
spec:
  selector:
    app: scraper-api
  ports:
    - port: 80
      targetPort: 8080


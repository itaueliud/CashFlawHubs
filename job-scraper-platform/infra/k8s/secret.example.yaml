apiVersion: v1
kind: Secret
metadata:
  name: scraper-secrets
  namespace: job-scraper
type: Opaque
stringData:
  MONGODB_URI: "mongodb+srv://user:password@cluster.example.mongodb.net/job-scraper"
  REDIS_URL: "redis://redis-host:6379"
  REDIS_HOST: "redis-host:6379"
  WEBSITE_API_BASE_URL: "https://your-site.example.com/api"
  WEBSITE_API_KEY: "replace_me"
  OPENAI_API_KEY: ""
  OPENAI_MODEL: "gpt-4.1-mini"
  DISCOVERY_SEED_DOMAINS: "example.com,another-company.com"
